name: Auto Deploy to payanganhospital.gianyarkab.go.id

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
        
      - name: Get Changed Files
        id: changed
        run: |
          echo "files=$(git diff --name-only HEAD~1 HEAD)" >> $GITHUB_OUTPUT
          
      - name: Deploy via Webhook
        if: contains(steps.changed.outputs.files, 'maha-lakshmi')
        run: |
          echo "🚀 Triggering webhook deploy..."
          curl -s -X POST "https://payanganhospital.gianyarkab.go.id/webhook.php" || echo "Webhook not configured yet"
          
      - name: Create Deploy Summary
        run: |
          echo "## 🚀 Auto-Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Repository:** ${{ github.repository }}**" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`**" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}**" >> $GITHUB_STEP_SUMMARY
          echo "**Files changed:**" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          git diff --name-only HEAD~1 HEAD >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🌐 **Website:** https://payanganhospital.gianyarkab.go.id/maha-lakshmi" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ **Deploy triggered!**" >> $GITHUB_STEP_SUMMARY
          
      - name: Display Summary
        run: |
          echo "🚀 Auto Deploy Completed!"
          echo "📁 Repository: ${{ github.repository }}"
          echo "🔖 Commit: ${{ github.sha }}"
          echo "👤 Triggered by: ${{ github.actor }}"
          echo ""
          echo "📂 Changed files:"
          git diff --name-only HEAD~1 HEAD
          echo ""
          echo "✅ Deploy triggered!"
          echo "🌐 Website: https://payanganhospital.gianyarkab.go.id/maha-lakshmi"
