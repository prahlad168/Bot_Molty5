name: 🔒 Guardrails → 🧪 Tests → 🏗️ Build → 📦 Push → 🚀 Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  guardrails-lint:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements-test.txt

      - name: Run Ruff linter
        run: ruff check app/ bot/ tests/

      - name: Upload lint report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: lint-report
          path: .ruff_cache/

  dependencies-check:
    name: Dependency Verification
    runs-on: ubuntu-latest
    needs: guardrails-lint
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install runtime dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt
          pip check

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir -r requirements-test.txt
          pip check

  tests:
    name: 🧪 Test Suite
    runs-on: ubuntu-latest
    needs: [guardrails-lint, dependencies-check]
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --no-cache-dir -r requirements.txt -r requirements-test.txt

      - name: Run pytest
        run: pytest tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

      - name: Check coverage threshold
        run: |
          pytest tests/ --cov=app --cov=bot --cov-report=term-missing || true

  docker-build:
    name: 🏗️ Docker Build & Test
    runs-on: ubuntu-latest
    needs: tests
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run Docker test target
        run: |
          docker build --target test -t maha-lakshmi:test .

      - name: Build production image
        run: |
          docker build --target production -t maha-lakshmi:latest .

      - name: Test image health
        run: |
          docker run --rm maha-lakshmi:latest python -c "import fastapi; import bot; print('OK')"

  push:
    name: 📦 Push to Registry
    runs-on: ubuntu-latest
    needs: docker-build
    if: success()
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: 🚀 Deploy to Fly.io
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@1.5

      - name: Deploy to Fly.io
        run: flyctl deploy --remote-only --no-decluster
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
